<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>高校生物 4択問題アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <section id="home" class="card hero">
    <h1>高校生物 4択問題アプリ</h1>
    <p class="subtitle">No.1〜204を統合した問題集です。1問ずつ解答し、途中保存・続きから再開・間違えた問題だけの復習ができます。</p>
    <p>
      <span class="pill">全 <span id="totalCount">0</span> 問</span>
      <span class="pill">直近の間違い <span id="wrongCount">0</span> 問</span>
    </p>
    <div class="menu">
      <button class="btn primary" onclick="start('all')">最初から</button>
      <button id="continueBtn" class="btn secondary" onclick="resume()">続きから</button>
      <button id="wrongBtn" class="btn warning" onclick="start('wrong')">間違えた問題だけ</button>
      <button class="btn ghost" onclick="start('random')">ランダム20問</button>
      <button class="btn ghost" onclick="showHistory()">学習記録</button>
      <button class="btn danger" onclick="resetAll()">保存データ削除</button>
    </div>
    <p class="small">進捗はこのブラウザ内に保存されます。別の端末や別のブラウザには引き継がれません。</p>
  </section>

  <section id="quiz" class="card hidden">
    <div class="topbar">
      <span class="qnum" id="modeLabel"></span>
      <div class="progressWrap"><div id="progress" class="progress"></div></div>
      <span class="qnum" id="qCounter"></span>
    </div>
    <h2 id="questionText" class="question"></h2>
    <div id="choices" class="choices"></div>
    <div id="feedback"></div>
    <div class="nav">
      <button id="prevBtn" class="btn ghost" onclick="prev()">前へ</button>
      <button class="btn danger" onclick="stopNow()">終了して中間結果</button>
      <button id="nextBtn" class="btn primary" onclick="next()">次へ</button>
    </div>
  </section>

  <section id="result" class="card hidden">
    <h2 id="resultTitle">結果</h2>
    <div id="scoreStats" class="stats"></div>
    <h3>間違えた問題一覧</h3>
    <div id="wrongList"></div>
    <div class="nav">
      <button id="resumeFromResult" class="btn secondary" onclick="resume()">続きに戻る</button>
      <button class="btn primary" onclick="init()">ホームへ</button>
      <button class="btn warning" onclick="start('wrong')">間違えた問題だけ解く</button>
    </div>
  </section>

  <section id="history" class="card hidden">
    <h2>学習記録</h2>
    <div style="overflow:auto">
      <table>
        <thead><tr><th>日時</th><th>モード</th><th>得点</th><th>正答率</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
    <h3>苦手問題（直近の間違い）</h3>
    <div id="weakList"></div>
    <div class="nav"><button class="btn primary" onclick="init()">ホームへ</button></div>
  </section>
</main>
<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
