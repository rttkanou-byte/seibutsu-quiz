function save(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state));}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY));}catch(e){return null}}
function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {attempts:{}, sessions:[]};}catch(e){return {attempts:{}, sessions:[]}}}
function saveHistory(h){localStorage.setItem(HISTORY_KEY, JSON.stringify(h));}
function hasSaved(){const s=load(); return s && s.order && s.order.length && !s.finished;}
function show(id){['home','quiz','result','history'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function init(){
 $('totalCount').textContent=QUESTIONS.length;
 $('continueBtn').disabled=!hasSaved();
 const wrong=lastWrongIds(); $('wrongCount').textContent=wrong.length; $('wrongBtn').disabled=wrong.length===0;
 show('home');
}
function makeOrder(type){
 let ids=QUESTIONS.map((_,i)=>i);
 if(type==='wrong'){ids=lastWrongIds().map(id=>QUESTIONS.findIndex(q=>q.id===id)).filter(i=>i>=0)}
 if(type==='random'){ids=shuffle(ids).slice(0, Math.min(20, ids.length));}
 return ids;
}
function shuffle(a){a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a;}
function start(type){
 const order=makeOrder(type);
 if(!order.length){alert('対象の問題がありません。');return;}
 modeLabel= type==='wrong'?'間違えた問題だけ': type==='random'?'ランダム20問':'全問題';
 state={order,index:0,answers:{},wrongIds:[],correct:0,finished:false,startedAt:new Date().toISOString(),mode:type};
 save(); renderQuestion();
}
function resume(){const s=load(); if(!s){init();return} state=s; modeLabel=s.mode==='wrong'?'間違えた問題だけ':s.mode==='random'?'ランダム20問':'全問題'; renderQuestion();}
function currentQ(){return QUESTIONS[state.order[state.index]]}
function renderQuestion(){
 show('quiz'); const q=currentQ(); const answered=state.answers[q.id];
 $('modeLabel').textContent=modeLabel;
 $('qCounter').textContent=`${state.index+1} / ${state.order.length}`;
 $('progress').style.width=`${((state.index)/state.order.length)*100}%`;
 $('questionText').textContent=q.question;
 const box=$('choices'); box.innerHTML='';
 q.choices.forEach((c,i)=>{const b=document.createElement('button'); b.className='choice'; b.innerHTML=`<b>${i+1}.</b> ${escapeHtml(c)}`; b.onclick=()=>answer(i); if(answered){b.classList.add('disabled'); if(i===q.answer)b.classList.add('correct'); if(i===answered.selected && i!==q.answer)b.classList.add('wrong');} box.appendChild(b);});
 $('feedback').innerHTML=''; $('feedback').className='';
 if(answered){showFeedback(q, answered.selected===q.answer, answered.selected);}
 $('prevBtn').disabled=state.index===0;
 $('nextBtn').textContent=state.index===state.order.length-1?'結果を見る':'次へ';
}
function answer(i){const q=currentQ(); if(state.answers[q.id])return; const ok=i===q.answer; state.answers[q.id]={selected:i, ok}; if(ok)state.correct++; else if(!state.wrongIds.includes(q.id))state.wrongIds.push(q.id); updateAttempt(q.id, ok); save(); renderQuestion();}
function showFeedback(q, ok, selected){
 const div=$('feedback'); div.className='resultBox '+(ok?'ok':'ng');
 div.innerHTML=`<h3>${ok?'○ 正解です':'× 不正解です'}</h3><p>正解：<b>${q.answer+1}. ${escapeHtml(q.choices[q.answer])}</b></p><div class="explain"><b>解説</b><br>${escapeHtml(q.explanation)}</div>`;
}
function next(){ if(state.index<state.order.length-1){state.index++; save(); renderQuestion();} else finish();}
function prev(){ if(state.index>0){state.index--; save(); renderQuestion();}}
function finish(){state.finished=true; save(); const h=loadHistory(); h.sessions.push({date:new Date().toISOString(),mode:state.mode,total:state.order.length,answered:Object.keys(state.answers).length,correct:state.correct,wrongIds:state.wrongIds}); saveHistory(h); renderResult(false);}
function stopNow(){renderResult(true)}
function renderResult(intermediate){
 show('result'); const total=state.order.length; const answered=Object.keys(state.answers).length; const correct=state.correct; const rate=answered?Math.round(correct/answered*100):0;
 $('resultTitle').textContent=intermediate?'中間結果':'結果';
 $('scoreStats').innerHTML=`<div class="stat"><span>解答済み</span><b>${answered}</b><span>/ ${total}</span></div><div class="stat"><span>正解</span><b>${correct}</b></div><div class="stat"><span>正答率</span><b>${rate}%</b></div><div class="stat"><span>間違い</span><b>${state.wrongIds.length}</b></div>`;
 renderWrongList('wrongList', state.wrongIds);
 $('resumeFromResult').classList.toggle('hidden', !intermediate);
}
function renderWrongList(target, ids){const el=$(target); if(!ids.length){el.innerHTML='<p class="small">間違えた問題はありません。</p>';return;} el.innerHTML=ids.map(id=>{const q=QUESTIONS.find(x=>x.id===id); return `<div class="wrongItem"><span class="pill">No.${q.id}</span><p><b>${escapeHtml(q.question)}</b></p><p>正解：${q.answer+1}. ${escapeHtml(q.choices[q.answer])}</p><details><summary>解説を見る</summary><div class="explain">${escapeHtml(q.explanation)}</div></details></div>`}).join('')}
function lastWrongIds(){const s=load(); if(s && s.wrongIds && s.wrongIds.length)return s.wrongIds; const h=loadHistory(); if(h.sessions && h.sessions.length)return h.sessions[h.sessions.length-1].wrongIds||[]; return [];}
function updateAttempt(id, ok){const h=loadHistory(); h.attempts[id]=h.attempts[id]||{try:0,ok:0}; h.attempts[id].try++; if(ok)h.attempts[id].ok++; saveHistory(h);}
function showHistory(){show('history'); const h=loadHistory(); const sessions=h.sessions||[]; const rows=sessions.slice(-10).reverse().map(s=>`<tr><td>${new Date(s.date).toLocaleString('ja-JP')}</td><td>${s.mode}</td><td>${s.correct}/${s.answered}</td><td>${s.answered?Math.round(s.correct/s.answered*100):0}%</td></tr>`).join(''); $('historyBody').innerHTML=rows||'<tr><td colspan="4">履歴はまだありません。</td></tr>'; const weak=Object.entries(h.attempts||{}).filter(([id,a])=>a.try>=2 && a.ok/a.try<0.7).map(([id])=>Number(id)); renderWrongList('weakList', weak);}
function resetAll(){if(confirm('保存された途中経過と履歴を削除しますか？')){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(HISTORY_KEY);init();}}
function escapeHtml(str){return String(str).replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));}
window.addEventListener('load',init);
